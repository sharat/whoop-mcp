name: Weekly Auto-Patch Release

on:
  schedule:
    # Runs at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Check for new changes and determine next version
        id: check_changes
        run: |
          # Find the latest tag matching v*
          LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag found: $LATEST_TAG"
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tag found. Initializing with version v0.0.1."
            NEW_TAG="v0.0.1"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          else
            # Get list of commits since the last tag
            COMMITS_SINCE=$(git log "$LATEST_TAG"..HEAD --oneline)
            if [ -z "$COMMITS_SINCE" ]; then
              echo "No new commits since $LATEST_TAG. Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "Found new commits since $LATEST_TAG:"
              echo "$COMMITS_SINCE"
              
              # Strip the 'v' prefix and increment patch version
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
              MAJOR="${VERSION_PARTS[0]}"
              MINOR="${VERSION_PARTS[1]}"
              PATCH="${VERSION_PARTS[2]}"
              
              if ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
                PATCH=0
              fi
              
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
              echo "Determined next version: $NEW_TAG"
              
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Review, build and tidy changes
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          # Run go mod tidy to ensure everything is clean
          go mod tidy
          
          # If tidy resulted in changes, commit and push them
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected after go mod tidy. Committing and pushing..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: automated weekly dependency tidy"
            git push origin HEAD:${{ github.ref_name }}
          fi
          
          # Verify, build and test changes to ensure stability
          go mod verify
          go test -v ./...
          go build -v ./...

      - name: Tag the commit
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          NEW_TAG="${{ steps.check_changes.outputs.new_tag }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Run GoReleaser to publish release
        if: steps.check_changes.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
